<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetFlow | Gestão Móvel</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Emojis como ícones para rapidez -->
</head>
<body>
    <div id="app">
        <!-- Header fixo -->
        <header>
            <div class="brand">
                <span class="logo">🚀 PetFlow</span>
                <span class="badge">Móvel</span>
            </div>
            <div class="user-profile">
                <span class="status-dot online"></span>
                <span class="username">Dona Maria</span>
            </div>
        </header>

        <!-- Navegação Principal (Tabs no estilo App) -->
        <main id="main-content">
            <!-- PÁGINA: DASHBOARD -->
            <section id="dashboard" class="page active">
                <div class="welcome">
                    <h1>Bom dia, Maria! 🐾</h1>
                    <p>Você tem <strong id="today-count">0</strong> atendimentos hoje.</p>
                </div>

                <div class="card routes-card">
                    <div class="card-header">
                        <h2>📍 Próximos Atendimentos</h2>
                        <button class="btn-small">Ver Mapa</button>
                    </div>
                    <ul class="route-list" id="dashboard-route-list">
                        <!-- Gerado via JS -->
                    </ul>
                </div>

                <div class="card alerts-card">
                    <h2>⚠️ Alertas de Retorno</h2>
                    <div id="alerts-list">
                        <!-- Gerado via JS -->
                    </div>
                </div>
            </section>

            <!-- PÁGINA: AGENDA -->
            <section id="agenda" class="page">
                <div class="page-header">
                    <h1>Calendário 📅</h1>
                    <button class="btn-primary" onclick="openModal('modal-agenda')">+ Novo</button>
                </div>
                <div class="calendar-strip" id="calendar-strip">
                    <!-- Gerado dinamicamente via JS (Hoje, Amanhã, Depois) -->
                </div>
                <div class="timeline" id="agenda-timeline">
                    <!-- Gerado via JS -->
                </div>
            </section>

            <!-- PÁGINA: PETS / CADASTRO -->
            <section id="pets" class="page">
                <div class="page-header">
                    <h1>Meus Clientes 🐾</h1>
                    <button class="btn-primary" onclick="openModal('modal-pet')">+ Cadastro</button>
                </div>
                <div class="search-bar">
                    <input type="text" placeholder="Buscar pet ou tutor..." id="pet-search" onkeyup="searchPets()">
                </div>
                <div class="pet-grid" id="pet-list">
                    <!-- Gerado via JS -->
                </div>
            </section>

            <!-- PÁGINA: CONFIGURAÇÕES -->
            <section id="config" class="page">
                <h1>Ajustes ⚙️</h1>
                <div class="card">
                    <h2>Visual</h2>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span>Modo Escuro</span>
                        <button class="btn-small" id="dark-mode-toggle" onclick="toggleDarkMode()">Ativar</button>
                    </div>
                </div>
                <div class="card">
                    <h2>Tabela de Preços</h2>
                    <ul class="price-list">
                        <li><span>Pelo Curto</span> <strong>R$ 50,00</strong></li>
                        <li><span>Pelo Médio</span> <strong>R$ 70,00</strong></li>
                        <li><span>Pelo Longo</span> <strong>R$ 90,00</strong></li>
                    </ul>
                </div>
            </section>
        </main>

        <!-- MODAIS (Popups) -->
        <div id="modal-pet" class="modal">
            <div class="modal-content">
                <h2>Novo Cadastro</h2>
                <form id="form-pet">
                    <label>Nome do Pet</label>
                    <input type="text" id="new-pet-name" required>
                    <label>Tipo de Pelo</label>
                    <select id="new-pet-hair">
                        <option value="curto">Curto (Labrador/Jack)</option>
                        <option value="medio">Médio (Shih-tzu)</option>
                        <option value="longo">Longo (Spitz/Akita)</option>
                    </select>
                    <label>Tutor (Nome)</label>
                    <input type="text" id="new-tutor-name" required>
                    <div class="modal-actions">
                        <button type="button" class="btn-link" onclick="closeModal('modal-pet')">Cancelar</button>
                        <button type="submit" class="btn-primary">Salvar</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Menu Inferior (Bottom Nav) -->
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="showPage('dashboard')">
                <span class="icon">🏠</span>
                <span class="label">Início</span>
            </button>
            <button class="nav-item" onclick="showPage('agenda')">
                <span class="icon">📅</span>
                <span class="label">Agenda</span>
            </button>
            <button class="nav-item" onclick="showPage('pets')">
                <span class="icon">🐾</span>
                <span class="label">Pets</span>
            </button>
            <button class="nav-item" onclick="showPage('config')">
                <span class="icon">⚙️</span>
                <span class="label">Ajustes</span>
            </button>
        </nav>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
